# docker-compose.yaml
# 도커 파일을 어떻게 실행할지 정의하는 파일
# 모든 환경 구동 가능

version: '3.8'

services:
  # 1. 백엔드 서비스 (FastAPI)
  backend:
    build: .
    container_name: team3-backend
    # 소스 코드 변경 시 자동 재시작 (--reload)
    # 0.0.0.0으로 열어야 외부(Host)에서 접속 가능
    command: uvicorn src.backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  # 2. 프론트엔드 서비스 (Streamlit)
  frontend:
    build: .
    container_name: team3-frontend
    # src/app.py가 아니라 src/frontend/app.py로 경로 수정됨
    command: streamlit run src/frontend/app.py --server.port=8501 --server.address=0.0.0.0
    # 내 8501번 문을 도커의 8501 문과 연결
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    # [중요] 백엔드가 먼저 켜져야 함
    depends_on:
      - backend
    environment:
      # 도커 네트워크 내부에서는 'localhost' 대신 서비스명('backend')을 사용해야 함
      - API_URL=http://backend:8000